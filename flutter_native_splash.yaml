flutter_native_splash:
  color: "#6750A4"
  color_dark: "#121212"
  image: assets/icon.png
  image_dark: assets/icon.png
  branding: assets/branding.png
  branding_dark: assets/branding.png
  android_12:
    image: assets/icon.png
    icon_background_color: "#6750A4"
    branding: assets/branding.png
  ios: true
  web: true
  remove_algorithm: true

  # The following options are optional and can be used to customize the splash screen
  # background_color will be used unless color or color_dark is set.
  # The image will be used unless image or image_dark is set.
  # The branding will be used unless branding or branding_dark is set.

  # If you want to specify specific files, you can use the following options:
  # android:
  #   drawable: [drawable]
  #   drawable_v26: [drawable]
  #   mipmap: [mipmap]
  #   mipmap_v26: [mipmap]
  # ios:
  #   image: [image]
  #   color: [string]
  #   image_dark: [image]
  #   color_dark: [string]
  #   table_view: [table_view] (only for iPad)

  # If you want to use a different image for Android 12+:
  # android_12:
  #   image: [image]
  #   icon_background_color: [string] (will be used if image is not set)
  #   branding: [image]
  #   branding_mode: [both|horizontal|vertical] (will be used if branding is not set)

  # The following options are useful for development and testing:
  # You can remove the android_12 block and just use android_12: true
  # to use a simple solid color splash.
  # You can also remove the android and ios options to use the defaults.

  # The following option creates a simple centered splash screen.
  # Remove android and ios if you don't want to create a simple splash screen.
  
  # If you want to specify specific fill colors:
  # fill_color: "#FFFFFF"
  # fill_color_dark: "#121212"
  
  # If you want to set the splash screen to a specific color instead of the above:
  # color: "#6750A4"
  # color_dark: "#121212"