name: qr_vault

description: "Scan, decode & save QR codes — fast, private, offline."

publish_to: 'none'

version: 1.1.2+10



environment:

  sdk: ^3.0.0



dependencies:

  flutter:

    sdk: flutter

  

  mobile_scanner: ^7.2.0

  flutter_riverpod: ^2.6.1

  go_router: ^17.2.2

  permission_handler: ^12.0.1

  hive: ^2.2.3

  hive_flutter: ^1.1.0

  share_plus: ^13.1.0

  url_launcher: ^6.2.6

  path_provider: ^2.1.3

  uuid: ^4.4.0

  app_links: ^6.4.0

  receive_sharing_intent: 1.8.1

  qr_flutter: ^4.1.0

  screenshot: ^3.0.0

  wakelock_plus: ^1.6.1

  image_picker: ^1.2.2

  google_mlkit_barcode_scanning: ^0.14.2

  image: ^4.5.4



dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^6.0.0

  hive_generator: ^2.0.1

  build_runner: ^2.4.9

  flutter_launcher_icons: ^0.14.4

  flutter_native_splash: ^2.3.10



flutter_native_splash:

  color: "#121212"

  color_dark: "#121212"

  image: assets/splash_logo.png

  image_dark: assets/splash_logo.png

  android_12:

    image: assets/splash_logo.png

    icon_background_color: "#121212"

  ios: true

  fullscreen: true



flutter_launcher_icons:

  android: true

  ios: true

  image_path: "assets/app_icon.png"

  adaptive_icon_background: "#121212"

  adaptive_icon_foreground: "assets/app_icon_foreground.png"

  adaptive_icon_foreground_inset: 0

  remove_alpha_ios: true



flutter:

  uses-material-design: true

  assets:

    - assets/privacy_policy.txt

    - assets/app_icon.png

    - assets/splash_logo.png

