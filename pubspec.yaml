name: qr_vault
description: "Scan, decode & save QR codes — fast, private, offline."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # Camera and QR scanning
  mobile_scanner: ^7.2.0
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^17.2.2
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  
  # Sharing
  share_plus: ^13.1.0
  
  # URL launching
  url_launcher: ^6.2.6
  
  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0
  intl: ^0.20.2

  # Animations
  animations: ^2.2.0
  flutter_native_splash: ^2.3.10

  # QR Generation
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  flutter_colorpicker: ^1.0.0

  # Google Mobile Ads
  google_mobile_ads: ^8.0.0
  wakelock_plus: ^1.6.1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: assets/splash_logo.png
  android_12: true
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/privacy_policy.txt
    - assets/app_icon.png
    - assets/splash_logo.png
